<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#0a1209;--surface:#101d12;--surface2:#172310;--text:#FAF8F2;--muted:#8a9e8c;--gold:#E8A23D;--border:rgba(255,255,255,0.08);}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;}
a{color:inherit;text-decoration:none;}

/* NAV */
nav{display:flex;align-items:center;justify-content:space-between;padding:1rem 2rem;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(10,18,9,.92);backdrop-filter:blur(12px);z-index:100;}
.nav-logo{font-size:1.1rem;font-weight:800;letter-spacing:.02em;color:var(--gold);}
.nav-back{font-size:13px;color:var(--muted);border:1px solid var(--border);padding:6px 14px;border-radius:20px;transition:color .15s,border-color .15s;}
.nav-back:hover{color:var(--text);border-color:rgba(255,255,255,.25);}

/* HERO */
.hero{padding:3rem 2rem 2rem;text-align:center;border-bottom:1px solid var(--border);}
.hero-badge{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);background:rgba(232,162,61,.1);border:1px solid rgba(232,162,61,.25);border-radius:20px;padding:4px 14px;margin-bottom:1rem;}
.hero h1{font-size:clamp(1.6rem,4vw,2.6rem);font-weight:800;margin-bottom:.5rem;}
.hero-sub{color:var(--muted);font-size:.95rem;margin-bottom:.5rem;}
.hero-count{font-size:.85rem;color:rgba(232,162,61,.75);}

/* CONTROLS */
.controls{display:flex;align-items:center;gap:1rem;padding:1.2rem 2rem;border-bottom:1px solid var(--border);}
.search-input{flex:1;max-width:320px;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:8px 14px;border-radius:8px;font-size:13px;font-family:inherit;}
.search-input:focus{outline:none;border-color:rgba(232,162,61,.4);}
.photo-count{font-size:12.5px;color:var(--muted);}

/* GRID */
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:4px;padding:4px;}
.photo-card{display:block;overflow:hidden;aspect-ratio:3/2;background:var(--surface2);cursor:pointer;}
.photo-card img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .2s;}
.photo-card:hover img{transform:scale(1.04);}

/* PAGINATION */
.pagination{display:flex;align-items:center;justify-content:center;gap:8px;padding:2rem;flex-wrap:wrap;}
.page-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:7px 13px;border-radius:8px;cursor:pointer;font-size:13px;font-family:inherit;transition:background .15s;}
.page-btn:hover{background:rgba(255,255,255,.1);}
.page-btn.active{background:var(--gold);color:#000;border-color:var(--gold);font-weight:700;}
.page-info{font-size:12.5px;color:var(--muted);}

/* LIGHTBOX */
#lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:9999;align-items:center;justify-content:center;}
#lb.open{display:flex;}
#lb img{max-width:90vw;max-height:88vh;object-fit:contain;border-radius:6px;}
#lb-close{position:absolute;top:1rem;right:1.2rem;background:none;border:none;color:#fff;font-size:2rem;cursor:pointer;line-height:1;}
#lb-prev,#lb-next{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.12);border:none;color:#fff;font-size:2rem;padding:8px 14px;cursor:pointer;border-radius:6px;}
#lb-prev{left:1rem;}#lb-next{right:1rem;}
#lb-counter{position:absolute;bottom:1rem;left:50%;transform:translateX(-50%);font-size:12.5px;color:rgba(255,255,255,.5);}
#lb-link{position:absolute;bottom:1rem;right:1.5rem;font-size:12px;color:rgba(232,162,61,.8);text-decoration:none;}
#lb-link:hover{color:var(--gold);}

@media(max-width:600px){
  .gallery-grid{grid-template-columns:repeat(2,1fr);}
  nav{padding:.75rem 1rem;}
  .hero{padding:2rem 1rem 1.5rem;}
  .controls{padding:.75rem 1rem;}
  #lb-prev,#lb-next{font-size:1.4rem;padding:6px 10px;}
}
</style>
</head>

var PER_PAGE = 48;
var currentPage = 1;
var filtered = allPhotos.slice();
var lbIdx = 0;

function renderGrid() {
  var grid = document.getElementById('galleryGrid');
  grid.innerHTML = '';
  var start = (currentPage - 1) * PER_PAGE;
  var end = Math.min(start + PER_PAGE, filtered.length);
  for (var i = start; i < end; i++) {
    var p = filtered[i];
    var card = document.createElement('div');
    card.className = 'photo-card';
    card.dataset.idx = i;
    card.innerHTML = '<img src="' + p.src + '" loading="lazy" alt="Thaimun 2026">';
    card.addEventListener('click', (function(idx){ return function(){ openLb(idx); }; })(i));
    grid.appendChild(card);
  }
  document.getElementById('photoCount').textContent = filtered.length + ' photos';
  renderPagination();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderPagination() {
  var pg = document.getElementById('pagination');
  pg.innerHTML = '';
  var totalPages = Math.ceil(filtered.length / PER_PAGE);
  if (totalPages <= 1) return;

  var info = document.createElement('span');
  info.className = 'page-info';
  info.textContent = 'Page ' + currentPage + ' of ' + totalPages;
  pg.appendChild(info);

  var pages = [];
  pages.push(1);
  for (var i = Math.max(2, currentPage-2); i <= Math.min(totalPages-1, currentPage+2); i++) pages.push(i);
  if (totalPages > 1) pages.push(totalPages);
  pages = [...new Set(pages)];

  pages.forEach(function(p) {
    var btn = document.createElement('button');
    btn.className = 'page-btn' + (p === currentPage ? ' active' : '');
    btn.textContent = p;
    btn.addEventListener('click', function(){ currentPage = p; renderGrid(); });
    pg.appendChild(btn);
  });
}

// Search
var searchTimer;
document.getElementById('searchInput').addEventListener('input', function() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(function() {
    currentPage = 1;
    filtered = allPhotos.filter(function(p){ return true; }); // all photos (no captions to search)
    renderGrid();
  }, 300);
});

// Lightbox
function openLb(idx) {
  lbIdx = idx;
  var p = filtered[idx];
  document.getElementById('lb-img').src = p.src;
  document.getElementById('lb-link').href = p.page;
  document.getElementById('lb-counter').textContent = (idx + 1) + ' / ' + filtered.length;
  document.getElementById('lb').classList.add('open');
}
function closeLb() {
  document.getElementById('lb').classList.remove('open');
  document.getElementById('lb-img').src = '';
}
document.getElementById('lb-close').addEventListener('click', closeLb);
document.getElementById('lb-prev').addEventListener('click', function() {
  lbIdx = (lbIdx - 1 + filtered.length) % filtered.length;
  openLb(lbIdx);
});
document.getElementById('lb-next').addEventListener('click', function() {
  lbIdx = (lbIdx + 1) % filtered.length;
  openLb(lbIdx);
});
document.getElementById('lb').addEventListener('click', function(e) {
  if (e.target === this) closeLb();
});
document.addEventListener('keydown', function(e) {
  if (!document.getElementById('lb').classList.contains('open')) return;
  if (e.key === 'Escape') closeLb();
  if (e.key === 'ArrowLeft') { lbIdx = (lbIdx - 1 + filtered.length) % filtered.length; openLb(lbIdx); }
  if (e.key === 'ArrowRight') { lbIdx = (lbIdx + 1) % filtered.length; openLb(lbIdx); }
});

renderGrid();
</script>
